<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>義務工作發展局 - 百萬富翁</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #00051a; --atv-blue: #0b1d3d; --atv-gold: #e1b431;
            --atv-border: #4d94ff; --correct-green: #008f11; --wrong-red: #b30000;
        }
        body {
            background-color: var(--bg-dark); background-image: radial-gradient(circle, #1a2a6c, #00051a);
            color: white; font-family: "Microsoft JhengHei", sans-serif; margin: 0;
            height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        #start-screen { position: fixed; inset: 0; background: radial-gradient(circle, #2a5298, #00051a); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-style { padding: 15px 40px; font-size: 24px; background: var(--atv-gold); border: 3px solid white; border-radius: 50px; cursor: pointer; font-weight: bold; color: black; transition: 0.3s; }

        /* 視像區域 (Camera Zoom) */
        #video-container {
            position: absolute; left: 40px; bottom: 40px;
            width: 320px; height: 240px;
            border: 4px solid var(--atv-gold); border-radius: 15px;
            overflow: hidden; background: #000;
            box-shadow: 0 0 20px rgba(77, 148, 255, 0.5);
            z-index: 100; display: none;
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); /* 鏡像顯示 */ }

        /* 金額大道 */
        .money-ladder {
            position: absolute; right: 20px; top: 100px; bottom: 40px;
            width: 220px; background: rgba(0,0,0,0.6); border: 2px solid var(--atv-border);
            display: flex; flex-direction: column-reverse; overflow-y: auto; padding: 10px;
            scrollbar-width: none; border-radius: 10px; z-index: 50;
        }
        .money-ladder::-webkit-scrollbar { display: none; }
        .money-step { display: flex; justify-content: space-between; padding: 5px 10px; font-size: 18px; color: var(--atv-gold); }
        .money-step.active { background: var(--atv-gold); color: black; font-weight: bold; border-radius: 5px; }

        #retry-layer { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 2500; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #money-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); background: rgba(0,0,0,0.9); border: 5px solid var(--atv-gold); padding: 50px 100px; font-size: 60px; color: var(--atv-gold); z-index: 1500; text-align: center; border-radius: 20px; display: none; }
        .pop-animation { animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        
        .lifelines-container { position: absolute; top: 20px; left: 40px; display: flex; gap: 30px; }
        .lifeline-icon { width: 70px; height: 45px; background: #000; border: 3px solid var(--atv-border); border-radius: 25px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .lifeline-icon.used { opacity: 0.3; filter: grayscale(1); position: relative; }
        .lifeline-icon.used::after { content: "X"; color: red; position: absolute; font-size: 25px; }

        .game-main { width: 60%; margin-right: 15%; display: flex; flex-direction: column; gap: 40px; opacity: 0; transition: 1s; }
        .hexagon { background: var(--atv-blue); border: 3px solid var(--atv-border); clip-path: polygon(3% 0%, 97% 0%, 100% 50%, 97% 100%, 3% 100%, 0% 50%); display: flex; align-items: center; padding: 25px 60px; }
        .question-box { font-size: 32px; text-align: center; min-height: 80px; justify-content: center; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .option { font-size: 24px; cursor: pointer; }
        .selected { background: var(--atv-gold) !important; color: black; }
        .correct { background: var(--correct-green) !important; color: white; }
        .wrong { background: var(--wrong-red) !important; }
        #sad-emoji { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 200px; display: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="color:var(--atv-gold)">義務工作發展局</h1>
        <h2 style="font-size:50px">百萬富翁挑戰</h2>
        <button class="btn-style" onclick="initGame()">開始挑戰</button>
    </div>

    <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div id="retry-layer">
        <h1 style="font-size:60px; margin-bottom:30px;">下次加油！</h1>
        <button class="btn-style" onclick="continueAfterWrong()">繼續挑戰下一題</button>
    </div>

    <div id="sad-emoji">😭</div>
    <div id="money-popup"></div>

    <div class="lifelines-container">
        <div class="lifeline-wrapper"><div class="lifeline-icon" id="l-50" onclick="use5050()">50:50</div></div>
        <div class="lifeline-wrapper"><div class="lifeline-icon" id="l-ai" onclick="useL('l-ai')">📞</div></div>
        <div class="lifeline-wrapper"><div class="lifeline-icon" id="l-aud" onclick="useL('l-aud')">👥</div></div>
    </div>

    <div class="money-ladder" id="money-ladder"></div>

    <div class="game-main" id="game-ui">
        <div class="hexagon question-box" id="q-txt"></div>
        <div class="options-grid">
            <div class="hexagon option" onclick="hChoice(0)"><span>A:</span> <div id="o-0"></div></div>
            <div class="hexagon option" onclick="hChoice(1)"><span>B:</span> <div id="o-1"></div></div>
            <div class="hexagon option" onclick="hChoice(2)"><span>C:</span> <div id="o-2"></div></div>
            <div class="hexagon option" onclick="hChoice(3)"><span>D:</span> <div id="o-3"></div></div>
        </div>
    </div>

    <script>
        const moneyValues = [];
        for(let i=1; i<=40; i++) {
            let amt = i <= 10 ? i*100 : (i <= 20 ? (i-10)*1000 + 1000 : (i-20)*50000 + 11000);
            moneyValues.push(amt.toLocaleString());
        }

        const quizData = [];
        for(let i=0; i<40; i++) {
            quizData.push({ q: `第 ${i+1} 題：這是一道關於義務工作的測試題目？`, a: ["正確答案", "錯誤 B", "錯誤 C", "錯誤 D"], c: 0, m: `$${moneyValues[i]}` });
        }

        let cur = 0, canA = false, activeBGM = null, activeSFX = null;

        const ladderEl = document.getElementById('money-ladder');
        moneyValues.forEach((val, idx) => {
            const div = document.createElement('div');
            div.className = 'money-step';
            div.id = `step-${idx}`;
            div.innerHTML = `<span>${idx+1}</span> <span>$${val}</span>`;
            ladderEl.appendChild(div);
        });

        // --- 開啟視像功能 ---
        async function startWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                const video = document.getElementById('webcam');
                video.srcObject = stream;
                document.getElementById('video-container').style.display = 'block';
            } catch (err) {
                console.error("無法開啟相機: ", err);
                alert("請允許開啟相機以獲得最佳體驗！");
            }
        }

        function playSound(file, isLoop = false, isBGM = false) {
            if (!isBGM && activeSFX) { activeSFX.pause(); activeSFX.src = ""; }
            if (isBGM && activeBGM) { activeBGM.pause(); activeBGM.src = ""; }
            const audio = new Audio("music/" + file);
            audio.loop = isLoop;
            if (isBGM) activeBGM = audio; else activeSFX = audio;
            audio.play().catch(e => {});
            return audio;
        }

        function initGame() {
            document.getElementById('start-screen').style.display = 'none';
            startWebcam(); // 啟動相機
            playSound("main.mp3");
            setTimeout(() => {
                document.getElementById('game-ui').style.opacity = '1';
                startFlow();
            }, 3000);
        }

        function startFlow() {
            canA = false;
            if(activeBGM) { activeBGM.pause(); activeBGM.src = ""; }
            document.getElementById('sad-emoji').style.display = 'none';
            document.getElementById('retry-layer').style.display = 'none';
            
            document.querySelectorAll('.money-step').forEach(s => s.classList.remove('active'));
            const curStep = document.getElementById(`step-${cur}`);
            curStep.classList.add('active');
            curStep.scrollIntoView({ behavior: 'smooth', block: 'center' });

            const pop = document.getElementById('money-popup');
            pop.innerHTML = `第 ${cur + 1} 題<br>${quizData[cur].m}`;
            pop.style.display = 'block';
            pop.classList.add('pop-animation');
            playSound("new_q.mp3");

            setTimeout(() => {
                pop.style.display = 'none';
                pop.classList.remove('pop-animation');
                if(cur < 20) playSound("normal.mp3", true, true); else playSound("hard.mp3", true, true);
                document.getElementById('q-txt').innerText = quizData[cur].q;
                document.querySelectorAll('.option').forEach((el, i) => {
                    el.classList.remove('selected','correct','wrong');
                    el.style.visibility = 'visible';
                    document.getElementById(`o-${i}`).innerText = quizData[cur].a[i];
                });
                canA = true;
            }, 6000);
        }

        function hChoice(idx) {
            if(!canA) return; canA = false;
            const ops = document.querySelectorAll('.option');
            const corr = quizData[cur].c;
            ops[idx].classList.add('selected');

            setTimeout(() => {
                if(activeBGM) { activeBGM.pause(); activeBGM.src = ""; }
                if(idx === corr) {
                    ops[idx].classList.add('correct');
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                    if(cur === 39) { playSound("main.mp3"); } 
                    else { playSound("correct.mp3"); setTimeout(() => { cur++; startFlow(); }, 8000); }
                } else {
                    ops[idx].classList.add('wrong');
                    ops[corr].classList.add('correct');
                    playSound("wrong.mp3");
                    document.getElementById('sad-emoji').style.display = 'block';
                    setTimeout(() => { document.getElementById('retry-layer').style.display = 'flex'; }, 2000);
                }
            }, 1500);
        }

        function continueAfterWrong() {
            const lines = ['l-50', 'l-ai', 'l-aud'];
            lines.forEach(id => document.getElementById(id).classList.remove('used'));
            cur++;
            if(cur < 40) startFlow();
        }

        function use5050() {
            if(!canA || document.getElementById('l-50').classList.contains('used')) return;
            document.getElementById('l-50').classList.add('used');
            let ids = [0,1,2,3].filter(i => i !== quizData[cur].c).sort(()=>Math.random()-0.5);
            document.querySelectorAll('.option')[ids[0]].style.visibility = 'hidden';
            document.querySelectorAll('.option')[ids[1]].style.visibility = 'hidden';
        }
        function useL(id) { if(!canA || document.getElementById(id).classList.contains('used')) return; document.getElementById(id).classList.add('used'); }
    </script>
</body>
</html>
